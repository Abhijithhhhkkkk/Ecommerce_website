<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASIB</title>
  
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
           
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white font-sans text-gray-900 antialiased overflow-x-hidden">

    <header class="relative flex items-center justify-center py-6 mt-3">
        <h1 class="text-5xl font-bold text-black m-0" style="font-family: 'Playfair Display', serif;">EASIB</h1>
        
        <div class="absolute right-6">
            <button onclick="document.getElementById('sidebar').classList.toggle('translate-x-full')" class="border border-gray-300 shadow-sm px-4 py-2 bg-white text-black rounded hover:bg-gray-50 transition-colors">
                ≡ Menu
            </button>
        </div>
    </header>

    <div id="sidebar" class="fixed inset-y-0 right-0 z-50 w-64 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col h-screen">
        
        <div class="flex items-center justify-between p-4 border-b border-gray-200">
            <h5 class="text-xl font-semibold">Categories</h5>
            <button onclick="document.getElementById('sidebar').classList.add('translate-x-full')" class="text-gray-500 hover:text-black text-3xl leading-none">&times;</button>
        </div>
        
        <div class="p-4 flex justify-start">
            {% if logo.img_2 %}
                <img src="{{logo.img_2.url}}" alt="logo" class="w-24 h-auto object-cover">
            {% endif %}
        </div>
        
        <div class="flex-1 flex flex-col p-4">
            <nav class="flex flex-col space-y-4 mb-auto">
                {% for category in categories%}
                 <a class="text-gray-800 hover:text-black hover:underline transition-all capitalize" 
           href="#{{ category.title|slugify }}"
           onclick="document.getElementById('sidebar').classList.add('translate-x-full')">
           {{ category.title }}
        </a>
    {% endfor %}
            </nav>
            
            <div class="mt-6 pt-4 border-t border-gray-200">
                 {% if user.is_authenticated %}
        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="block w-full text-center border border-blue-600 text-blue-600 rounded py-2 mb-3 hover:bg-blue-50 transition-colors">
                Logout
            </button> 
        </form>
        {% else %}
                <a href="{% url 'login' %}" class="block w-full text-center border border-blue-600 text-blue-600 rounded py-2 mb-3 hover:bg-blue-50 transition-colors">Log In</a>
                <p class="text-center text-sm text-gray-600">No account? <a href="{% url 'register' %}" class="text-blue-600 hover:underline">Sign up</a></p>
                {% endif %}
            </div>
        </div>
    </div>

    <main>
        {% block contents %}
        {% endblock %}
    </main>
    
</body>
</html>
