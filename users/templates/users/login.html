{% extends "layout.html"%}
{% load crispy_forms_tags %}
{%block contents %}
    <div class="w-1/2 bg-white p-8 rounded-lg border border-gray-200 mx-auto mt-14">
        {% if messages %}
            {% for message in messages %}
                <div class="bg-blue-100 border-l-4 border-blue-500 text-blue-700 p-4 mb-4" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        <form method="POST">
             {% csrf_token %}
        <fieldset class="mb-6 ">
            <legend class=" text-2xl font-bold border-b border-gray-200 pb-2 mb-6 text-gray-900 ">
                <div class="text-center">
                Login Web Today</div>
            </legend>
            {{ form|crispy }}
           </fieldset>
           <div class="mt-6 flex justify-center items-center">
            <button class="w-1/2 bg-blue-600 text-white py-2 px-4 rounded"  type="submit">
                Sign In
            </button>
            <small class="text-muted ml-6">
            Forget password?<a class="ml-6 bg-blue-600 " href="{% url 'password_reset'%}"></a>
        </small>
           </div>
        </form>
        
    <div class="border-t border-gray-200 mt-6 pt-4 text-center">
        <small class="text-muted">
            Create An New Account<a class="ml-2 bg-blue-600 text-white px-4 py-2 rounded" href="{% url 'register'%}">Sign up</a>
        </small>
    </div>
    </div>
{% endblock %}
