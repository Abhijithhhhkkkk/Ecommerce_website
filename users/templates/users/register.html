{% extends "layout.html" %}
{% load crispy_forms_tags %}

{% block contents %}
<div class="bg-white p-8 rounded-lg border border-gray-200">
    
    {% if messages %}
        {% for message in messages %}
            <div class="bg-blue-100 border-l-4 border-blue-500 text-blue-700 p-4 mb-4" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <fieldset class="mb-6">
            <legend class="text-2xl font-bold border-b border-gray-200 pb-2 mb-6 text-gray-900">
                Join Web Today
            </legend>
            
            {{ form|crispy }}
            
        </fieldset>
        
        <div class="mt-6">
            <button class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded focus:outline-none" type="submit">
                Sign Up
            </button>
        </div>
    </form>
    
    <div class="border-t border-gray-200 mt-6 pt-4 text-center">
        <small class="text-gray-600">
            Already Have An Account? <a class="text-indigo-600 ml-1 font-semibold" href="{% url 'login' %}">Sign In</a>
        </small>
    </div>
</div>
{% endblock %}
